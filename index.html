<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Elite Gaming Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Orbitron', sans-serif;
    }

    body {
      background: #0b0b0f;
      color: #fff;
    }

    /* NAVBAR */
    header {
      display: flex;
      justify-content: space-between;
      padding: 20px 50px;
      background: rgba(0,0,0,0.8);
      border-bottom: 1px solid #ff003c;
    }

    .logo {
      font-size: 24px;
      color: #ff003c;
      font-weight: 600;
    }

    nav a {
      color: #fff;
      margin-left: 30px;
      text-decoration: none;
      transition: 0.3s;
    }

    nav a:hover {
      color: #ff003c;
    }

    /* HERO */
    .hero {
      height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: linear-gradient(180deg, #0b0b0f, #111);
    }

    .hero h1 {
      font-size: 50px;
      color: #ff003c;
    }

    .hero p {
      margin-top: 15px;
      color: #aaa;
    }

    .btn {
      margin-top: 25px;
      padding: 12px 30px;
      background: #ff003c;
      border: none;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff3366;
      transform: scale(1.05);
    }

    /* PRODUCTS */
    .products {
      padding: 60px 50px;
    }

    .products h2 {
      text-align: center;
      margin-bottom: 40px;
      color: #ff003c;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
    }

    .card {
      background: #14141a;
      padding: 20px;
      border-radius: 10px;
      transition: 0.3s;
      border: 1px solid transparent;
    }

    .card:hover {
      border: 1px solid #ff003c;
      transform: translateY(-10px);
    }

    .card img {
      width: 100%;
      border-radius: 8px;
    }

    .card h3 {
      margin-top: 15px;
    }

    .price {
      color: #ff003c;
      margin: 10px 0;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 20px;
      border-top: 1px solid #222;
      margin-top: 40px;
      color: #666;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">BLOODY ELITE</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">Accessories</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <div>
    <h1>DOMINATE THE GAME</h1>
    <p>Premium Gaming Accessories for Pro Players</p>
    <button class="btn">Shop Now</button>
  </div>
</section>

<section class="products">
  <h2>Featured Gear</h2>

  <div class="product-grid">

    <div class="card">
      <img src="https://via.placeholder.com/300x200" alt="">
      <h3>RGB Gaming Mouse</h3>
      <p class="price">$49</p>
      <button class="btn">Buy Now</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x200" alt="">
      <h3>Mechanical Keyboard</h3>
      <p class="price">$89</p>
      <button class="btn">Buy Now</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x200" alt="">
      <h3>Gaming Headset</h3>
      <p class="price">$69</p>
      <button class="btn">Buy Now</button>
    </div>

  </div>
</section>

<footer>
  <p>© 2026 Bloody Elite Gaming Store | All Rights Reserved</p>
</footer>

<script>
  document.querySelectorAll(".btn").forEach(btn => {
    btn.addEventListener("click", () => {
      alert("Feature coming soon!");
    });
  });
</script>

</body>
</html>
