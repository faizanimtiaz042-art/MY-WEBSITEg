<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Gaming Store</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

header {
    background: #020617;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-size: 24px;
    font-weight: bold;
    color: #38bdf8;
}

.search-bar input {
    padding: 10px;
    width: 300px;
    border-radius: 5px;
    border: none;
}

.cart {
    cursor: pointer;
}

.container {
    padding: 20px;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

.product {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    transition: 0.3s;
}

.product:hover {
    transform: scale(1.05);
}

.product img {
    width: 100%;
    border-radius: 10px;
}

button {
    background: #38bdf8;
    border: none;
    padding: 10px;
    margin-top: 10px;
    cursor: pointer;
    width: 100%;
    border-radius: 5px;
}

.ai-chat {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #020617;
    width: 300px;
    border-radius: 10px;
    padding: 10px;
}

#chat-output {
    height: 150px;
    overflow-y: auto;
    font-size: 14px;
}

</style>
</head>

<body>

<header>
    <div class="logo">🎮 Elite Gaming</div>
    <div class="search-bar">
        <input type="text" id="search" placeholder="Search products..." onkeyup="searchProducts()">
    </div>
    <div class="cart">🛒 Cart (<span id="cart-count">0</span>)</div>
</header>

<div class="container">
    <h2>Gaming Gear</h2>
    <div class="products" id="product-list"></div>
</div>

<!-- AI Chat -->
<div class="ai-chat">
    <div id="chat-output"></div>
    <input type="text" id="chat-input" placeholder="Ask AI..." onkeydown="handleChat(event)">
</div>

<script>
const products = [
    {name: "Gaming Keyboard RGB", price: 50, img: "https://via.placeholder.com/200"},
    {name: "Gaming Mouse Pro", price: 30, img: "https://via.placeholder.com/200"},
    {name: "Mechanical Keyboard", price: 80, img: "https://via.placeholder.com/200"},
    {name: "Wireless Gaming Mouse", price: 60, img: "https://via.placeholder.com/200"}
];

let cart = 0;

function displayProducts(list) {
    const container = document.getElementById("product-list");
    container.innerHTML = "";
    list.forEach((p, index) => {
        container.innerHTML += `
        <div class="product">
            <img src="${p.img}">
            <h3>${p.name}</h3>
            <p>$${p.price}</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>
        `;
    });
}

function addToCart() {
    cart++;
    document.getElementById("cart-count").innerText = cart;
}

function searchProducts() {
    const value = document.getElementById("search").value.toLowerCase();
    const filtered = products.filter(p => p.name.toLowerCase().includes(value));
    displayProducts(filtered);
}

// AI Chat (Basic Simulation)
function handleChat(e) {
    if (e.key === "Enter") {
        let input = document.getElementById("chat-input").value;
        let output = document.getElementById("chat-output");

        output.innerHTML += `<p><b>You:</b> ${input}</p>`;

        let response = "I recommend our RGB keyboards and pro gaming mice!";
        if (input.toLowerCase().includes("mouse")) {
            response = "Check out our high precision gaming mice!";
        }

        output.innerHTML += `<p><b>AI:</b> ${response}</p>`;
        document.getElementById("chat-input").value = "";
    }
}

displayProducts(products);
</script>

</body>
</html>
