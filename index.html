<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaming Store</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #000;
    color: white;
}

/* Header */
header {
    text-align: center;
    padding: 20px;
}

header h1 {
    color: #00ff00;
    font-size: 2.2em;
}

header p {
    color: #ccc;
    font-size: 1em;
}

/* Product Section */
.products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 10px;
}

.product {
    background-color: #111;
    border: 1px solid #00ff00;
    border-radius: 10px;
    margin: 15px;
    padding: 15px;
    width: 280px;
    text-align: center;
}

.product img {
    width: 100%;
    border-radius: 10px;
}

.product h2 {
    color: #00ff00;
    font-size: 1.4em;
}

.price {
    color: #fff;
    font-size: 1.2em;
    margin: 10px 0;
}

/* WhatsApp Button */
.btn {
    display: inline-block;
    background-color: red;
    color: white;
    padding: 10px 15px;
    text-decoration: none;
    border-radius: 5px;
}

/* Mobile Friendly */
@media (max-width: 600px) {
    header h1 {
        font-size: 1.6em;
    }
    .product {
        width: 90%;
    }
}
</style>

</head>

<body>

<header>
    <h1>🎮 Welcome to My Gaming Store 🎮</h1>
    <p>Best gaming accessories in Pakistan 🇵🇰</p>
</header>

<section class="products">

    <div class="product">
        <img src="https://via.placeholder.com/300x200" alt="Gaming Mouse">
        <h2>Gaming Mouse</h2>
        <div class="price">Rs. 3,000</div>
        <a class="btn" href="https://wa.me/923000000000">Buy on WhatsApp</a>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/300x200" alt="Gaming Keyboard">
        <h2>Gaming Keyboard</h2>
        <div class="price">Rs. 5,000</div>
        <a class="btn" href="https://wa.me/923000000000">Buy on WhatsApp</a>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/300x200" alt="Gaming PC">
        <h2>Gaming PC</h2>
        <div class="price">Rs. 120,000</div>
        <a class="btn" href="https://wa.me/923000000000">Buy on WhatsApp</a>
    </div>

</section>

</body>
</html>
